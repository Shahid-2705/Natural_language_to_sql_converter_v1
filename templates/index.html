<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SQL Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 20% 20%, #1e293b, #0f172a 70%);
    padding: 20px;
}

.app {
    width: 900px;
    height: 90vh;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

.header {
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.header h1 {
    font-size: 20px;
    color: white;
    font-weight: 600;
}

.header p {
    font-size: 13px;
    margin-top: 6px;
    color: rgba(200,210,255,0.6);
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.bubble {
    padding: 14px 18px;
    border-radius: 16px;
    max-width: 75%;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
}

.assistant {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: #e2e8f0;
}

.sql-block {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.5);
    border-radius: 12px;
    font-family: monospace;
    color: #22c55e;
    font-size: 13px;
}

.success {
    color: #10b981;
    margin-top: 8px;
}

.error {
    color: #ef4444;
    margin-top: 8px;
}

table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
    font-size: 13px;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-align: left;
}

th {
    color: #93c5fd;
}

.input-area {
    padding: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    gap: 12px;
}

.input-area input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

.input-area input::placeholder {
    color: rgba(255,255,255,0.4);
}

.input-area button {
    padding: 14px 24px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

.input-area button:hover {
    opacity: 0.9;
}

.chat::-webkit-scrollbar {
    width: 6px;
}

.chat::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>AI SQL Assistant</h1>
        <p>Natural Language → SQL Execution Engine</p>
    </div>

    <div class="chat" id="chat">
        <div class="bubble assistant">
            Hello. Ask a question about your employees database.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="queryInput" placeholder="Ask something like: Show employees in IT with salary > 50000">
        <button onclick="sendQuery()">Send</button>
    </div>

</div>

<script>
async function sendQuery() {
    const input = document.getElementById("queryInput");
    const chat = document.getElementById("chat");
    const query = input.value.trim();

    if (!query) return;

    // User bubble
    const userBubble = document.createElement("div");
    userBubble.className = "bubble user";
    userBubble.innerText = query;
    chat.appendChild(userBubble);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    // Loading bubble
    const loadingBubble = document.createElement("div");
    loadingBubble.className = "bubble assistant";
    loadingBubble.innerText = "Generating SQL...";
    chat.appendChild(loadingBubble);

    try {
        const response = await fetch("/query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ query: query })
        });

        const data = await response.json();
        chat.removeChild(loadingBubble);

        const assistantBubble = document.createElement("div");
        assistantBubble.className = "bubble assistant";

        if (data.error) {
            assistantBubble.innerHTML = `<div class="error">${data.error}</div>`;
        } else {
            assistantBubble.innerHTML = `
                Generated SQL:
                <div class="sql-block">${data.sql}</div>
            `;

            if (data.columns && data.data && data.data.length > 0) {
                let table = "<table><thead><tr>";
                data.columns.forEach(col => {
                    table += `<th>${col}</th>`;
                });
                table += "</tr></thead><tbody>";

                data.data.forEach(row => {
                    table += "<tr>";
                    row.forEach(cell => {
                        table += `<td>${cell}</td>`;
                    });
                    table += "</tr>";
                });

                table += "</tbody></table>";
                assistantBubble.innerHTML += table;
            } else if (data.message) {
                assistantBubble.innerHTML += `<div class="success">${data.message}</div>`;
            }
        }

        chat.appendChild(assistantBubble);
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        chat.removeChild(loadingBubble);

        const errorBubble = document.createElement("div");
        errorBubble.className = "bubble assistant";
        errorBubble.innerHTML = `<div class="error">Server error occurred.</div>`;
        chat.appendChild(errorBubble);
    }
}

// Enter key support
document.getElementById("queryInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendQuery();
    }
});
</script>

</body>
</html>
